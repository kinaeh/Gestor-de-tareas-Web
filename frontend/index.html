<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="auth-container" class="card">
            <h2 id="auth-title">Iniciar Sesión</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" required placeholder="tu@correo.com">
                </div>
                <div class="form-group">
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" required placeholder="********">
                </div>
                <button type="submit" id="auth-btn">Ingresar</button>
            </form>
            <p id="toggle-auth">¿No tienes cuenta? <span id="auth-action-text">Regístrate aquí</span></p>
        </div>

        <div id="dashboard-container" class="card hidden">
            <div class="dashboard-header">
                <h2>Mis Tareas</h2>
                <button id="logout-btn" class="btn-danger">Cerrar Sesión</button>
            </div>
            
            <form id="task-form">
                <input type="text" id="task-input" required placeholder="Escribe una nueva tarea...">
                <button type="submit">Agregar</button>
            </form>

            <ul id="task-list">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
